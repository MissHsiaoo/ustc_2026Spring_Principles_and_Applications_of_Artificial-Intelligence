title: 人工智能原理与应用
description: 研究生课程网站：课程信息、教学安排与每周资料下载
baseurl: ""
url: ""
repository: ""

permalink: pretty

defaults:
  - scope:
      path: "course"
      type: "pages"
    values:
      layout: "default"

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - bin/
  - lib/
  - "*.gemspec"
  - "*.gem"
  - LICENSE.txt
  - package.json
  - package-lock.json
  - Rakefile
  - README.md
  - CODE_OF_CONDUCT.md
  - docker-compose.yml
  - Dockerfile
  - docs/
  - fixtures/
  - spec/
  - tmp
  - .rspec

search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

enable_copy_code_button: true

mermaid:
  version: "9.1.6"

heading_anchors: true

aux_links: {}
aux_links_new_tab: false

nav_enabled: true
nav_sort: case_sensitive
nav_external_links: []
nav_error_report: true

liquid:
  error_mode: strict
  strict_filters: true

back_to_top: true
back_to_top_text: "Back to top"
footer_content: '人工智能原理与应用课程网站。资料可按大纲细目放入 <code>course-materials/topics/&lt;slug&gt;/</code>，整周材料放入 <code>course-materials/week-xx/</code>。'

last_edit_timestamp: false
last_edit_time_format: "%b %e %Y at %I:%M %p"

gh_edit_link: false
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: ""
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

color_scheme: nil

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

plugins:
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jekyll-include-cache
  - jekyll-sitemap

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

sass:
  quiet_deps: true
  silence_deprecations: ['import']
