      - 2.2.3 强化学习（试错与优化）：智能体与环境交互的核心框架（与生物学习类比）
      - 2.3 从浅层模型到深度网络：为何需要“深度”？（模型复杂度、表示能力与神经网络直觉）
    objectives:
      - 能针对不同问题选择合适的学习范式。
      - 能从表示能力角度理解深层网络的必要性。
      - 能将实验数据集与机器学习任务建立映射关系。
    practice:
      - 实验 1：数据探索与基线模型搭建。
      - 对比一个分类任务中的线性模型与树模型表现。
