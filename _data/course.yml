course:
  code: 待补充
  title_zh: 人工智能原理与应用
  title_en: Principles and Applications of Artificial Intelligence
  theory_hours: 42
  lab_hours: 20
  credits: 待定
  prerequisites:
    - 高等数学
    - 数字图像处理
  grading: 百分制
  prerequisite_rule: 全部通过
  assessment: 大作业
  department: 人工智能与数据科学学院
  audience: 研究生
  first_offered: 26年春
  available_terms:
    - 春
    - 秋
  textbook: 无
  references: 无
  summary: 面向研究生，系统覆盖人工智能的历史与范式、数据科学与机器学习、深度神经网络与生成式 AI（含大模型、视觉与多模态），以及 AI 赋能多学科科学的实践案例；强调直觉理解与“问题—数据—模型”链条，考核为大作业。
  summary_body_zh: |
    官方纸本大纲中的“内容简介”以结构化目录在本站《教学大纲》与下方模块树中逐条呈现；英文对照同步列出，便于双语对照与引用。

modules:
  - id: module-1
    title_zh: 人工智能的演进：从规则推理到数据驱动
    title_en: "Module 1: The Evolution of AI: From Rule-Based Reasoning to Data-Driven Intelligence"
    hours: 3
    core_concept_zh: 阐释 AI 并非横空出世，而是“理性主义”与“经验主义”在计算时代的延续与融合。
    core_concept_en: AI did not emerge out of nowhere but represents a continuation and fusion of Rationalism and Empiricism in the computational age.
    summary: 以历史视角解释人工智能从符号主义、统计学习到深度学习的演进，并串联现代大模型的综合范式。
    key_points:
      - 从图灵测试到达特茅斯会议，理解人工智能的学科起点与原始目标。
      - 对比符号主义、联结主义、行为主义三大范式及其代表问题。
      - 结合大模型说明现代 AI 如何融合知识、学习与交互。
    sections:
      - number: "1.1"
        title_zh: 思想起源与历史浪潮
        title_en: Intellectual Origins and Historical Waves
        subsections:
          - code: "1.1.1"
            title_zh: 从图灵测试到达特茅斯会议：人工智能的诞生与早期雄心
            title_en: "From the Turing Test to the Dartmouth Conference: The Birth and Early Ambitions of AI"
            slug: m1-1-1-turing-dartmouth
            week: 1
          - code: "1.1.2"
            title_zh: 符号主义的辉煌与困境：专家系统与第一次寒冬
            title_en: "The Glory and Dilemma of Symbolism: Expert Systems and the First AI Winter"
            slug: m1-1-2-symbolism-expert-systems
            week: 1
          - code: "1.1.3"
            title_zh: 统计学习的兴起：从数据中学习的范式转换
            title_en: "The Rise of Statistical Learning: The Paradigm Shift Towards Learning from Data"
            slug: m1-1-3-statistical-learning-paradigm
            week: 1
          - code: "1.1.4"
            title_zh: 深度学习的突破与第三次浪潮：表征学习的力量
            title_en: "The Breakthrough of Deep Learning and the Third Wave: The Power of Representation Learning"
            slug: m1-1-4-deep-learning-representation
            week: 1
      - number: "1.2"
        title_zh: 人工智能的三大范式（贯穿历史的视角）
        title_en: The Three Major Paradigms of AI (A Historical Perspective)
        subsections:
          - code: "1.2.1"
            title_zh: 符号主义（逻辑与知识）：如何让机器“思考”？
            title_en: "Symbolism (Logic and Knowledge): How to make machines \"think\"?"
            slug: m1-2-1-symbolism-logic-knowledge
            week: 1
          - code: "1.2.2"
            title_zh: 联结主义（学习与关联）：如何让机器“感知”？
            title_en: "Connectionism (Learning and Association): How to make machines \"perceive\"?"
            slug: m1-2-2-connectionism-learning
            week: 1
          - code: "1.2.3"
            title_zh: 行为主义（交互与优化）：如何让机器“行动”？
            title_en: "Behaviorism (Interaction and Optimization): How to make machines \"act\"?"
            slug: m1-2-3-behaviorism-interaction
            week: 1
          - code: 小结
            title_zh: 现代 AI 如何融合三大范式？——以大模型为例（知识内化于参数，通过交互学习）
            title_en: "How does Modern AI integrate these three paradigms? — Large Language Models as an example"
            slug: m1-2-summary-llm-integration
            week: 1
  - id: module-2
    title_zh: 数据科学与机器学习：智能的基石
    title_en: "Module 2: Data Science and Machine Learning: The Foundation of Intelligence"
    hours: 6
    core_concept_zh: 将数据科学定位为 AI 的“前置学科”，机器学习是“实现方法”，强化“从问题到数据，从数据到模型”的思维链条。
    core_concept_en: Position Data Science as the precursor discipline to AI and Machine Learning as the implementation method — from problem to data, and data to model.
    summary: 以“问题到数据、数据到模型”为主线，搭建数据科学与机器学习的入门认知框架。
    key_points:
      - 理解数据科学生命周期与数据预处理的重要性。
      - 区分监督学习、无监督学习、强化学习的核心任务与思维方式。
      - 从浅层模型过渡到深度网络，建立表示能力与模型复杂度的直觉。
    sections:
      - number: "2.1"
        title_zh: 数据科学导论：从观测到洞察
        title_en: Introduction to Data Science — From Observation to Insight
        subsections:
          - code: "2.1.1"
            title_zh: 数据科学生命周期：问题定义、数据收集、处理、建模、部署
            title_en: "The Data Science Lifecycle: Problem Definition, Data Collection, Processing, Modeling, Deployment"
            slug: m2-1-1-data-science-lifecycle
            week: 2
          - code: "2.1.2"
            title_zh: 数据预处理与特征工程：为模型准备“食材”
            title_en: "Data Preprocessing and Feature Engineering: Preparing the Ingredients for Models"
            slug: m2-1-2-preprocessing-feature-engineering
            week: 2
      - number: "2.2"
        title_zh: 机器学习核心思想：三种学习范式
        title_en: Core Ideas of Machine Learning — Three Learning Paradigms
        subsections:
          - code: "2.2.1"
            title_zh: 监督学习（归纳与预测）：回归与分类的思想（以线性模型、决策树为例）
            title_en: "Supervised Learning: Regression and Classification (linear models, decision trees; intuitive treatment)"
            slug: m2-2-1-supervised-learning
            week: 3
          - code: "2.2.2"
            title_zh: 无监督学习（发现与结构）：聚类与降维的思想（探索数据内在结构）
            title_en: "Unsupervised Learning: Clustering and Dimensionality Reduction"
            slug: m2-2-2-unsupervised-learning
            week: 3
          - code: "2.2.3"
            title_zh: 强化学习（试错与优化）：智能体与环境交互的核心框架（与生物学习类比）
            title_en: "Reinforcement Learning: Agent–Environment Interaction (analogous to biological learning)"
            slug: m2-2-3-reinforcement-learning
            week: 3
      - number: "2.3"
        title_zh: 从浅层模型到深度网络
        title_en: From Shallow Models to Deep Networks
        subsections:
          - code: "2.3"
            title_zh: 为何需要“深度”？——模型复杂度、表示能力与神经网络的基本直觉（神经元、分层抽象）
            title_en: "Why Depth? — Complexity, representational power, and neural network intuition"
            slug: m2-3-shallow-to-deep
            week: 3
  - id: module-3
    title_zh: 深度神经网络与生成式 AI 革命
    title_en: "Module 3: Deep Neural Networks and the Generative AI Revolution"
    hours: 21
    core_concept_zh: 技术核心在于表示学习与生成能力；讲授重点是关键突破的直觉与思想影响，而非数学细节。
    core_concept_en: Technical core via representation learning and generative capability; focus on intuition and intellectual impact rather than mathematical details.
    summary: 以表示学习和生成能力为主线，讲解深度学习、大模型、计算机视觉与多模态 AI 的关键突破。
    key_points:
      - 掌握 CNN、RNN、注意力机制与 Transformer 的核心直觉。
      - 理解预训练范式、提示工程、RAG 与 Agents 的应用逻辑。
      - 从视觉识别、扩散模型、多模态对齐到具身智能，形成完整技术图景。
    sections:
      - number: "3.1"
        title_zh: 深度学习基础：赋予机器感知能力
        title_en: Fundamentals of Deep Learning — Endowing Machines with Perceptual Ability
        subsections:
          - code: "3.1.1"
            title_zh: 卷积神经网络（CNN）：如何让机器“看见”——局部感知、参数共享、层次化特征提取
            title_en: "CNN: How machines \"see\" — local receptive fields, parameter sharing, hierarchical features"
            slug: m3-1-1-cnn
            week: 4
          - code: "3.1.2"
            title_zh: 循环神经网络（RNN）与注意力机制：如何让机器处理“序列”——短期记忆与聚焦关键信息
            title_en: "RNN and Attention: Sequences — short-term memory and focusing on key information"
            slug: m3-1-2-rnn-attention
            week: 4
      - number: "3.2"
        title_zh: 自然语言处理与大模型时代
        title_en: Natural Language Processing and the Era of Large Models
        subsections:
          - code: "3.2.1"
            title_zh: 从词袋到词向量：语言的分布式表示（将语义映射到向量空间）
            title_en: "From Bag-of-Words to Word Embeddings: Distributed representation of language"
            slug: m3-2-1-word-embeddings
            week: 5
          - code: "3.2.2"
            title_zh: Transformer 架构革命：自注意力机制如何统一理解与生成
            title_en: "The Transformer Revolution: How self-attention unifies understanding and generation"
            slug: m3-2-2-transformer
            week: 5
          - code: "3.2.3"
            title_zh: 预训练范式：从 BERT 到 GPT——“预训练 + 微调/提示”如何改变 AI 研发范式
            title_en: "Pre-training: From BERT to GPT — Pre-training + fine-tuning/prompting and the R&D paradigm shift"
            slug: m3-2-3-pretraining-paradigm
            week: 6
          - code: "3.2.4"
            title_zh: 大模型应用技术：提示工程、检索增强生成（RAG）、智能体（Agents）
            title_en: "Large Model Applications: Prompting, RAG, and Agents"
            slug: m3-2-4-llm-apps-prompt-rag-agents
            week: 6
      - number: "3.3"
        title_zh: 计算机视觉：从识别到创造
        title_en: Computer Vision — From Recognition to Creation
        subsections:
          - code: "3.3.1"
            title_zh: 视觉识别基础：目标检测、分割的核心思想
            title_en: "Visual Recognition: Core ideas in object detection and segmentation"
            slug: m3-3-1-visual-recognition
            week: 7
          - code: "3.3.2"
            title_zh: 视觉生成模型：扩散模型（Diffusion Model）的工作原理直觉——从噪声中“塑造”图像
            title_en: "Visual Generative Models: Intuition for diffusion — sculpting images from noise"
            slug: m3-3-2-diffusion-models
            week: 7
          - code: "3.3.3"
            title_zh: 三维视觉与表征学习：从 2D 到 3D 理解世界
            title_en: "3D Vision and Representation Learning: From 2D to 3D world understanding"
            slug: m3-3-3-3d-vision
            week: 8
      - number: "3.4"
        title_zh: 多模态人工智能：跨越感知的鸿沟
        title_en: Multimodal AI — Bridging the Perceptual Gap
        subsections:
          - code: "3.4.1"
            title_zh: 多模态对齐与融合：如何让 AI 同时理解文本、图像、声音？
            title_en: "Multimodal Alignment and Fusion: Text, images, and sound"
            slug: m3-4-1-multimodal-alignment
            week: 9
          - code: "3.4.2"
            title_zh: 视觉-语言大模型：CLIP、DALL·E 等工作原理与意义
            title_en: "Vision–Language Models: CLIP, DALL·E — principles and significance"
            slug: m3-4-2-vision-language-models
            week: 9
          - code: "3.4.3"
            title_zh: 具身智能与 AI 智能体：多模态感知如何驱动决策与行动——通往更通用 AI 的路径
            title_en: "Embodied AI and Agents: From perception to action — paths toward more general AI"
            slug: m3-4-3-embodied-ai-agents
            week: 10
  - id: module-4
    title_zh: AI 赋能科学实践案例
    title_en: "Module 4: AI for Science: Practical Case Studies"
    hours: 12
    core_concept_zh: 以生命、地理、化学、数学、地空与物理六大学科为轴，理解交汇、应用案例与讨论展望。
    core_concept_en: Six disciplinary pillars — intersection themes, applications, discussion, and outlook.
    summary: 面向生命、地理、化学、数学、地空与物理等学科，分析 AI 赋能科学研究的典型场景与方法迁移。
    key_points:
      - 理解 AI 在科学研究中的角色：观测、建模仿真、预测与自动化。
      - 掌握不同学科案例背后的共性方法，如表示学习、生成模型与决策。
      - 从“讨论与展望”中提炼可验证的跨学科选题，服务课程大作业。
    sections:
      - number: "4.1"
        title_zh: AI 赋能生命科学
        title_en: AI for Life Sciences
        subsections:
          - code: "4.1.1"
            title_zh: AI 与生命科学的交汇
            title_en: The Intersection of AI and Life Sciences
            slug: m4-1-1-life-intersection
            week: 11
          - code: "4.1.2"
            title_zh: 应用：AI + 生物医学研究、临床医学、公共卫生
            title_en: "Applications: AI + Biomedical Research, Clinical Medicine, Public Health"
            slug: m4-1-2-life-applications
            week: 11
          - code: "4.1.3"
            title_zh: 讨论与展望
            title_en: Discussion and Outlook
            slug: m4-1-3-life-outlook
            week: 11
      - number: "4.2"
        title_zh: AI 赋能地理科学
        title_en: AI for Geographic Sciences
        subsections:
          - code: "4.2.1"
            title_zh: AI 与地理科学的交汇
            title_en: The Intersection of AI and Geographic Sciences
            slug: m4-2-1-geo-intersection
            week: 11
          - code: "4.2.2"
            title_zh: 应用：AI + 环境监测、城市管理、地球系统科学
            title_en: "Applications: AI + Environmental Monitoring, Urban Management, Earth System Science"
            slug: m4-2-2-geo-applications
            week: 11
          - code: "4.2.3"
            title_zh: 讨论与展望
            title_en: Discussion and Outlook
            slug: m4-2-3-geo-outlook
            week: 11
      - number: "4.3"
        title_zh: AI 赋能化学
        title_en: AI for Chemistry
        subsections:
          - code: "4.3.1"
            title_zh: AI 与化学的交汇
            title_en: The Intersection of AI and Chemistry
            slug: m4-3-1-chem-intersection
            week: 12
          - code: "4.3.2"
            title_zh: 应用：AI + 分子与材料、反应与合成、过程与自动化
            title_en: "Applications: AI + Molecules & Materials, Reactions & Synthesis, Processes & Automation"
            slug: m4-3-2-chem-applications
            week: 12
          - code: "4.3.3"
            title_zh: 讨论与展望
            title_en: Discussion and Outlook
            slug: m4-3-3-chem-outlook
            week: 12
      - number: "4.4"
        title_zh: AI 赋能数学科学
        title_en: AI for Mathematical Sciences
        subsections:
          - code: "4.4.1"
            title_zh: AI 与数学的交汇
            title_en: The Intersection of AI and Mathematical Sciences
            slug: m4-4-1-math-intersection
            week: 12
          - code: "4.4.2"
            title_zh: 应用：AI + 自动定理证明、偏微分方程求解、统计推断与数据科学
            title_en: "Applications: AI + Automated Theorem Proving, PDE Solving, Statistical Inference & Data Science"
            slug: m4-4-2-math-applications
            week: 12
          - code: "4.4.3"
            title_zh: 讨论与展望
            title_en: Discussion and Outlook
            slug: m4-4-3-math-outlook
            week: 12
      - number: "4.5"
        title_zh: AI 赋能地空科学
        title_en: AI for Earth and Space Sciences
        subsections:
          - code: "4.5.1"
            title_zh: AI 与地空科学的交汇
            title_en: The Intersection of AI and Earth/Space Sciences
            slug: m4-5-1-earthspace-intersection
            week: 13
          - code: "4.5.2"
            title_zh: 应用：AI + 大气建模与气象预测、遥感、空间探测、行星探测
            title_en: "Applications: AI + Atmospheric Modeling & Weather Forecasting, Remote Sensing, Space & Planetary Exploration"
            slug: m4-5-2-earthspace-applications
            week: 13
          - code: "4.5.3"
            title_zh: 讨论与展望
            title_en: Discussion and Outlook
            slug: m4-5-3-earthspace-outlook
            week: 13
      - number: "4.6"
        title_zh: AI 赋能物理科学
        title_en: AI for Physical Sciences
        subsections:
          - code: "4.6.1"
            title_zh: AI 与物理的交汇
            title_en: The Intersection of AI and Physics
            slug: m4-6-1-physics-intersection
            week: 13
          - code: "4.6.2"
            title_zh: 应用：AI + 数据驱动物理建模（PDE/动力系统）、凝聚态与材料、量子计算
            title_en: "Applications: AI + Data-Driven Physical Modeling (PDE/Dynamical Systems), Condensed Matter & Materials, Quantum Computing"
            slug: m4-6-2-physics-applications
            week: 13
          - code: "4.6.3"
            title_zh: 讨论与展望
            title_en: Discussion and Outlook
            slug: m4-6-3-physics-outlook
            week: 13

weeks:
  - week: 1
    slug: week-01
    module_id: module-1
    title: 人工智能的演进与三大范式
    theory_hours: 3
    lab_hours: 0
    materials_folder: /course-materials/week-01/
    focus: 从历史浪潮与思想谱系切入课程，建立“符号主义、联结主义、行为主义”三大范式的整体认识。
    outline:
      - 1.1.1 从图灵测试到达特茅斯会议：人工智能的诞生与早期雄心
      - 1.1.2 符号主义的辉煌与困境：专家系统与第一次寒冬
      - 1.1.3 统计学习的兴起：从数据中学习的范式转换
      - 1.1.4 深度学习的突破与第三次浪潮：表征学习的力量
      - 1.2.1 符号主义（逻辑与知识）：如何让机器“思考”？
      - 1.2.2 联结主义（学习与关联）：如何让机器“感知”？
      - 1.2.3 行为主义（交互与优化）：如何让机器“行动”？
      - 小结 现代 AI 如何融合三大范式？——以大模型为例
    objectives:
      - 能解释人工智能发展历程中的关键转折。
      - 能区分三大范式分别回答“思考、感知、行动”的方式。
      - 能用大模型举例说明现代 AI 的融合趋势。
    practice:
      - 阅读课程大纲与课程项目要求，完成选题兴趣登记。
      - 整理一个 AI 发展里程碑时间轴作为课前或课后小练习。
  - week: 2
    slug: week-02
    module_id: module-2
    title: 数据科学导论与特征工程
    theory_hours: 3
    lab_hours: 0
    materials_folder: /course-materials/week-02/
    focus: 用数据科学生命周期建立建模前的完整思维链条，理解问题定义和特征准备的重要性。
    outline:
      - 2.1.1 数据科学生命周期：问题定义、数据收集、处理、建模、部署
      - 2.1.2 数据预处理与特征工程：为模型准备“食材”
    objectives:
      - 能从应用问题反推所需数据与建模目标。
      - 能描述数据清洗、标准化、编码和特征构造的基本作用。
      - 能为后续实验准备规范的数据处理流程。
    practice:
      - 选择一个公开数据集，完成问题定义和数据字段梳理。
      - 设计一页数据预处理流程图。
  - week: 3
    slug: week-03
    module_id: module-2
    title: 机器学习三种范式与从浅层到深度
    theory_hours: 3
    lab_hours: 2
    materials_folder: /course-materials/week-03/
    focus: 梳理监督学习、无监督学习、强化学习三大框架，并建立神经网络“为什么需要深度”的直觉。
    outline:
      - 2.2.1 监督学习（归纳与预测）：回归与分类的思想（以线性模型、决策树为例）
